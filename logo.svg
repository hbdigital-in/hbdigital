<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-label="HB Digital">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&amp;family=Outfit:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Monogram badge -->
  <rect x="0" y="8" width="56" height="56" rx="10" fill="#1a1a2e"/>
  <rect x="3" y="11" width="50" height="50" rx="8" fill="none" stroke="#c9a84c" stroke-width="1"/>

  <!-- HB monogram -->
  <!-- H -->
  <text x="10" y="47"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="32" font-weight="600"
    fill="#c9a84c" letter-spacing="-1">H</text>
  <!-- B -->
  <text x="30" y="47"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="32" font-weight="600"
    fill="#ffffff">B</text>

  <!-- Thin vertical divider -->
  <line x1="72" y1="16" x2="72" y2="56" stroke="#e4e0d8" stroke-width="1"/>

  <!-- Wordmark: HB Digital -->
  <text x="84" y="40"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="32" font-weight="600"
    fill="#1a1a2e" letter-spacing="1">HB <tspan fill="#c9a84c">Digital</tspan></text>

  <!-- Tagline -->
  <text x="86" y="57"
    font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="400"
    fill="#7a7a9a" letter-spacing="2.5">WEBSITES · EMAIL · GOOGLE</text>

  <!-- Gold underline accent under name -->
  <line x1="84" y1="42" x2="270" y2="42" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
</svg>
